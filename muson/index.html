<!-- Inspired by the Muson toy synth -->

<!doctype html>
<html lang="ko">
    <head>
        <link rel="stylesheet" href="style.css" />
        <script src="./index.js"></script>
    </head>
    <body>
        <div class="muson" aria-label="Muson Synth Illustration">
            <div class="top-bar">
                <div class="speaker-bar"><div class="speakers"></div></div>
                <div class="muson-frame">
                    <div class="rainbow">
                        MUS&nbsp;&nbsp;N
                        <span class="line1">SYNTHESIZER</span>
                        <span class="line2">THE SOUND OF MUSIC™</span>
                    </div>
                </div>
            </div>
            <div class="range-container" aria-hidden="true">
                <div class="range-plate">
                    <div class="left">
                        <ul class="ranges">
                            <li>1–4</li>
                            <li>1–6</li>
                            <li>1–8</li>
                            <li>1–10</li>
                        </ul>
                        <p>Range</p>
                        <div class="slider-wrapper">
                            <div class="slider"></div>
                        </div>
                    </div>
                    <div class="center">
                        <p>Volume</p>
                        <ul>
                            <li>Lo</li>
                            <li>Med</li>
                            <li>High</li>
                        </ul>
                        <div class="switch-wrapper">
                            <div class="switch-button"></div>
                        </div>
                    </div>
                    <div class="right">
                        <p>Mode</p>
                        <ul>
                            <li>Off</li>
                            <li>Organ</li>
                            <li>Organ <br />& Synth</li>
                        </ul>
                        <div class="slider-wrapper">
                            <div class="slider"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="button-container">
                <div class="button c4">
                    <div class="center"></div>
                </div>
                <div class="button d4">
                    <div class="center"></div>
                </div>
                <div class="button e4">
                    <div class="center"></div>
                </div>
                <div class="button f4">
                    <div class="center"></div>
                </div>
                <div class="button g4">
                    <div class="center"></div>
                </div>
                <div class="button a4">
                    <div class="center"></div>
                </div>
                <div class="button b4">
                    <div class="center"></div>
                </div>
                <div class="button c5">
                    <div class="center"></div>
                </div>
                <div class="button d5">
                    <div class="center"></div>
                </div>
                <div class="button e5">
                    <div class="center"></div>
                </div>
            </div>
            <div class="letter-container" aria-hidden="true">
                <div>
                    <p>C</p>
                </div>
                <div>
                    <p>D</p>
                </div>
                <div>
                    <p>E</p>
                </div>
                <div>
                    <p>F</p>
                </div>
                <div>
                    <p>G</p>
                </div>
                <div>
                    <p>A</p>
                </div>
                <div>
                    <p>B</p>
                </div>
                <div>
                    <p>C</p>
                </div>
                <div>
                    <p>D</p>
                </div>
                <div>
                    <p>E</p>
                </div>
            </div>
            <div class="key-container">
                <div id="c4-key" style="z-index: 12"></div>
                <div id="d4-key" style="z-index: 11"></div>
                <div id="e4-key" style="z-index: 10"></div>
                <div id="f4-key" style="z-index: 9"></div>
                <div id="g4-key" style="z-index: 8"></div>
                <div id="a4-key" style="z-index: 7"></div>
                <div id="b4-key" style="z-index: 6"></div>
                <div id="c5-key" style="z-index: 5"></div>
                <div id="d5-key" style="z-index: 4"></div>
                <div id="e5-key" style="z-index: 3"></div>
            </div>
            <div class="speed-container" aria-hidden="true">
                <p>Fast</p>
                <div class="speed-slider"></div>
                <div class="speed-button-container">
                    <div class="speed-button"></div>
                </div>
                <p>Slow</p>
            </div>
            <div class="vol-container" aria-hidden="true">
                <p>High</p>
                <div class="vol-slider"></div>
                <div class="vol-button-container">
                    <div class="vol-button"></div>
                </div>
                <p>Low</p>
            </div>
        </div>
    </body>
</html>
